name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ROSTER_SYNC_API_URL: ${{ secrets.ROSTER_SYNC_API_URL }}
      ROSTER_SYNC_TOKEN: ${{ secrets.ROSTER_SYNC_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh roster snapshot
        run: npm run sync:rosters

      - name: Sync roster snapshot to shared state worker
        if: ${{ env.ROSTER_SYNC_API_URL != '' && env.ROSTER_SYNC_TOKEN != '' }}
        run: npm run sync:state

      - name: Build Angular app for Pages
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/lostark_roster/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
