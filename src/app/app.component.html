<app-header [rosters]="rostersData" [loading]="isLoading"></app-header>

<div *ngIf="status === 'pending' && isLoading" class="loading-state">
  <mat-progress-spinner class="spinner" [mode]="mode"></mat-progress-spinner>
  <p>{{ loadingMessage }}</p>
</div>

<div *ngIf="status === 'error'" class="error-state">
  <h2>{{ errorTitle }}</h2>
  <p>{{ errorMessage }}</p>
  <button type="button" class="retry-button" (click)="loadRosters()">Try again</button>
</div>

<ng-container *ngIf="status === 'success'">
  <app-roster [rosters]="rostersData"></app-roster>
</ng-container>
