<mat-toolbar>
  <div class="toolbar-shell">
    <div class="title-block">
      <span class="eyebrow">CE roster board</span>
      <h1>Roster HQ</h1>
    </div>

    <div class="header-side">
      <div class="hero-metrics" *ngIf="rosters.length > 0">
        <div class="hero-metric">
          <span class="metric-caption">Tracked characters</span>
          <strong>{{ trackedCharacters() }}</strong>
        </div>
        <div class="hero-metric">
          <span class="metric-caption">Average peak ilvl</span>
          <strong>{{ averagePeakLevel() | number:'1.2-2' }}</strong>
        </div>
      </div>

      <div class="reset-metrics" *ngIf="rosters.length > 0">
        <div class="reset-metric">
          <span class="metric-caption">Daily Reset</span>
          <strong>{{ dailyReset }}</strong>
        </div>
        <div class="reset-metric">
          <span class="metric-caption">Weekly Reset</span>
          <strong>{{ weeklyReset }}</strong>
        </div>
      </div>

      <div class="roster-pills" *ngIf="rosters.length > 0">
        <span class="roster-pill" *ngFor="let roster of rosters">{{ roster.title }}</span>
      </div>
    </div>
  </div>
</mat-toolbar>
